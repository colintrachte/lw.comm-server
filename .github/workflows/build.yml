name: Multi-Platform Build and Release

on:
  push:
    branches:
      - electron_bundler
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout lw.comm-server
        uses: actions/checkout@v4
        with:
          path: lw.comm-server

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y icnsutils graphicsmagick xz-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: lw.comm-server/package-lock.json

      - name: Clone and Build LaserWeb4
        shell: bash
        run: |
          git clone https://github.com/LaserWeb/LaserWeb4.git
          cd LaserWeb4
          git checkout dev-es6
          npm install
          npm run installdev
          npm run bundle-dev

      - name: Build lw.comm-server
        shell: bash
        run: |
          cd lw.comm-server
          npm install
          ./node_modules/.bin/electron-rebuild
          npm run dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: lw.comm-server/dist/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.exe
            release-assets/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}